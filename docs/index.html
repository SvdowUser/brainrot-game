.char-select.active{border-color:#ffd96c;box-shadow:0 0 20px rgba(255,217,108,0.3);background:rgba(255,217,108,0.1)}

<script type="module">
import * as THREE from 'three';

// === GAME CONFIG ===
const CONFIG = {
  arena: { size: 40, wallHeight: 3 },
  player: { speed: 8, dashSpeed: 25, dashDuration: 0.2, dashCooldown: 1.5, health: 100, attackRange: 2.5, attackDamage: 20 },
  camera: { height: 12, distance: 10, angle: Math.PI / 4 },
  enemies: { spawnInterval: 3, maxCount: 15 },
  waves: { enemiesPerWave: 5, waveDelay: 5 }
};

const BRAINROT_CHARS = {
  tralalerito: { color: 0x79f1dd, bodyColor: 0x8899aa, name: 'Tralalerito', emoji: '🦈', speed: 1.0, health: 100, damage: 20 },
  bombardiro: { color: 0xff6b6b, bodyColor: 0x556644, name: 'Bombardiro', emoji: '🐊', speed: 0.8, health: 130, damage: 25 },
  trippi: { color: 0x88ff88, bodyColor: 0x448844, name: 'Trippi Troppi', emoji: '🐸', speed: 1.2, health: 80, damage: 15 },
  lirili: { color: 0xcc88ff, bodyColor: 0x664488, name: 'Lirili Larila', emoji: '🦋', speed: 1.1, health: 90, damage: 18 },
};

const ENEMY_TYPES = [
  { name: 'FUD Spreader', color: 0xff4444, speed: 3, health: 40, damage: 10, size: 0.6, score: 10 },
  { name: 'Rug Puller', color: 0xff8800, speed: 2, health: 80, damage: 20, size: 0.9, score: 25 },
  { name: 'Scam Bot', color: 0xcc00cc, speed: 5, health: 25, damage: 8, size: 0.4, score: 15 },
  { name: 'Bear Market', color: 0x884444, speed: 1.5, health: 150, damage: 30, size: 1.2, score: 50 },
];

const DEATH_MSGS = [
  "tralalerito believes in you", "the vibes were not strong enough",
  "skill issue tbh", "even sharks get eaten sometimes",
  "respawning your dignity...", "memes > fundamentals... but not health",
  "the fud was too strong", "gg no re... ok maybe re"
];

// === GAME STATE ===
let scene, camera, renderer, clock;
let player = null, enemies = [], coins = [], particles = [];
let gameState = 'menu'; // menu, playing, gameover
let score = 0, wave = 1, health = 100;
let selectedChar = 'tralalerito';
let keys = {}, moveDir = { x: 0, z: 0 };
let dashCooldown = 0, isDashing = false, dashTimer = 0;
let attackCooldown = 0;

// === THREE.JS SETUP ===
function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a2e);
  scene.fog = new THREE.FogExp2(0x0a0a2e, 0.025);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  
  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game'), antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  // Lights
  const ambient = new THREE.AmbientLight(0x334466, 0.6);
  scene.add(ambient);
  
  const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
  dirLight.position.set(10, 15, 10);
  dirLight.castShadow = true;
  dirLight.shadow.camera.near = 0.1;
  dirLight.shadow.camera.far = 50;
  dirLight.shadow.camera.left = -25;
  dirLight.shadow.camera.right = 25;
  dirLight.shadow.camera.top = 25;
  dirLight.shadow.camera.bottom = -25;
  dirLight.shadow.mapSize.set(1024, 1024);
  scene.add(dirLight);

  const pointLight = new THREE.PointLight(0x79f1dd, 0.5, 30);
  pointLight.position.set(0, 5, 0);
  scene.add(pointLight);

  clock = new THREE.Clock();
  buildArena();
}

function buildArena() {
  // Ground
  const groundGeo = new THREE.PlaneGeometry(CONFIG.arena.size, CONFIG.arena.size, 20, 20);
  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x1a1a3e,
    roughness: 0.8,
    metalness: 0.2
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Grid lines on ground
  const gridHelper = new THREE.GridHelper(CONFIG.arena.size, 20, 0x2a2a5e, 0x1a1a4e);
  gridHelper.position.y = 0.01;
  scene.add(gridHelper);

  // Arena walls (glowing edges)
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x79f1dd, emissive: 0x79f1dd, emissiveIntensity: 0.3, transparent: true, opacity: 0.6 });
  const half = CONFIG.arena.size / 2;
  const wallH = CONFIG.arena.wallHeight;
  
  [[-half, 0, 0, 0.2, wallH, CONFIG.arena.size], [half, 0, 0, 0.2, wallH, CONFIG.arena.size],
   [0, 0, -half, CONFIG.arena.size, wallH, 0.2], [0, 0, half, CONFIG.arena.size, wallH, 0.2]].forEach(([x, y, z, w, h, d]) => {
    const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
    wall.position.set(x, h/2, z);
    scene.add(wall);
  });

  // Decorative pillars
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const r = CONFIG.arena.size * 0.35;
    const pillar = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3, 0.4, 4, 8),
      new THREE.MeshStandardMaterial({ color: 0x2a2a5e, emissive: 0x4444aa, emissiveIntensity: 0.1 })
    );
    pillar.position.set(Math.cos(angle) * r, 2, Math.sin(angle) * r);
    pillar.castShadow = true;
    scene.add(pillar);
    
    // Pillar light
    const pLight = new THREE.PointLight(0x6666ff, 0.3, 8);
    pLight.position.set(Math.cos(angle) * r, 4.5, Math.sin(angle) * r);
    scene.add(pLight);
  }
}

function createCharacter(charData, isPlayer = false) {
  const group = new THREE.Group();
  
  // Body (rounded)
  const bodyGeo = new THREE.SphereGeometry(0.5, 16, 12);
  bodyGeo.scale(1, 1.2, 0.8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: charData.bodyColor, roughness: 0.6, metalness: 0.1 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.8;
  body.castShadow = true;
  group.add(body);

  // Eyes
  [-0.15, 0.15].forEach(x => {
    const eye = new THREE.Mesh(
      new THREE.SphereGeometry(0.1, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0x111111 })
    );
    eye.position.set(x, 0.95, 0.35);
    group.add(eye);
    
    const shine = new THREE.Mesh(
      new THREE.SphereGeometry(0.04, 6, 6),
      new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.5 })
    );
    shine.position.set(x + 0.03, 0.98, 0.38);
    group.add(shine);
  });

  // Character-specific features
  if (charData.name === 'Tralalerito') {
    // Dorsal fin
    const fin = new THREE.Mesh(
      new THREE.ConeGeometry(0.15, 0.4, 4),
      new THREE.MeshStandardMaterial({ color: charData.bodyColor })
    );
    fin.position.set(0, 1.5, -0.1);
    group.add(fin);
    
    // Sneakers (teal!)
    [-0.2, 0.2].forEach(x => {
      const shoe = new THREE.Mesh(
        new THREE.BoxGeometry(0.18, 0.1, 0.25),
        new THREE.MeshStandardMaterial({ color: 0x40E0D0 })
      );
      shoe.position.set(x, 0.05, 0.05);
      group.add(shoe);
    });
  }

  // Glow ring for player
  if (isPlayer) {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(0.6, 0.75, 32),
      new THREE.MeshBasicMaterial({ color: charData.color, transparent: true, opacity: 0.4, side: THREE.DoubleSide })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.02;
    group.add(ring);
    group.userData.ring = ring;
  }

  // Shadow disc
  const shadow = new THREE.Mesh(
    new THREE.CircleGeometry(0.4, 16),
    new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 })
  );
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = 0.01;
  group.add(shadow);

  group.userData = { ...charData, health: charData.health, maxHealth: charData.health, isPlayer, body };
  return group;
}

function createEnemy(type) {
  const group = new THREE.Group();
  
  // Spiky body
  const bodyGeo = new THREE.DodecahedronGeometry(type.size, 0);
  const bodyMat = new THREE.MeshStandardMaterial({
    color: type.color,
    emissive: type.color,
    emissiveIntensity: 0.2,
    roughness: 0.5
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = type.size + 0.1;
  body.castShadow = true;
  group.add(body);

  // Eyes
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5 });
  [-0.15, 0.15].forEach(x => {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(type.size * 0.15, 6, 6), eyeMat);
    eye.position.set(x * type.size, type.size + 0.2, type.size * 0.7);
    group.add(eye);
  });

  // Shadow
  const shadow = new THREE.Mesh(
    new THREE.CircleGeometry(type.size * 0.8, 12),
    new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.2 })
  );
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = 0.01;
  group.add(shadow);

  // Spawn position (edge of arena)
  const side = Math.floor(Math.random() * 4);
  const half = CONFIG.arena.size / 2 - 1;
  const pos = Math.random() * CONFIG.arena.size - half;
  if (side === 0) group.position.set(-half, 0, pos);
  else if (side === 1) group.position.set(half, 0, pos);
  else if (side === 2) group.position.set(pos, 0, -half);
  else group.position.set(pos, 0, half);

  group.userData = { ...type, health: type.health, maxHealth: type.health, body, rotSpeed: 0.5 + Math.random() };
  return group;
}

function spawnCoin(pos) {
  const coin = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.2, 0.05, 16),
    new THREE.MeshStandardMaterial({ color: 0xffd96c, emissive: 0xffd96c, emissiveIntensity: 0.5, metalness: 0.8 })
  );
  coin.position.set(pos.x + (Math.random()-0.5)*2, 0.5, pos.z + (Math.random()-0.5)*2);
  coin.rotation.x = Math.PI / 2;
  coin.userData = { value: 5, time: 0 };
  scene.add(coin);
  coins.push(coin);
}

function addKillMsg(text) {
  const feed = document.getElementById('kill-feed');
  const el = document.createElement('div');
  el.className = 'kill-msg';
  el.textContent = text;
  feed.prepend(el);
  if (feed.children.length > 5) feed.lastChild.remove();
  setTimeout(() => el.remove(), 3000);
}

// === INPUT ===
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Mobile joystick
const joystick = document.getElementById('joystick-move');
const joyInner = document.getElementById('joy-inner');
let joyActive = false, joyStart = { x: 0, y: 0 };

if (joystick) {
  joystick.addEventListener('touchstart', e => {
    joyActive = true;
    const t = e.touches[0];
    const r = joystick.getBoundingClientRect();
    joyStart = { x: r.left + r.width/2, y: r.top + r.height/2 };
  });
  window.addEventListener('touchmove', e => {
    if (!joyActive) return;
    const t = e.touches[0];
    const dx = (t.clientX - joyStart.x) / 50;
    const dy = (t.clientY - joyStart.y) / 50;
    const mag = Math.sqrt(dx*dx + dy*dy);
    const clamp = Math.min(mag, 1);
    moveDir.x = mag > 0.1 ? (dx/mag)*clamp : 0;
    moveDir.z = mag > 0.1 ? (dy/mag)*clamp : 0;
    if (joyInner) {
      joyInner.style.transform = `translate(calc(-50% + ${moveDir.x*25}px), calc(-50% + ${moveDir.z*25}px))`;
    }
  });
  window.addEventListener('touchend', () => {
    joyActive = false;
    moveDir.x = 0; moveDir.z = 0;
    if (joyInner) joyInner.style.transform = 'translate(-50%,-50%)';
  });
}

document.getElementById('btn-attack')?.addEventListener('touchstart', () => attack());
document.getElementById('btn-dash')?.addEventListener('touchstart', () => dash());

// === GAME LOGIC ===
function startGame() {
  score = 0; wave = 1; health = 100;
  enemies.forEach(e => scene.remove(e));
  coins.forEach(c => scene.remove(c));
  enemies = []; coins = [];
  
  if (player) scene.remove(player);
  const charData = BRAINROT_CHARS[selectedChar];
  player = createCharacter(charData, true);
  player.position.set(0, 0, 0);
  health = charData.health;
  scene.add(player);
  
  updateUI();
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('gameover').classList.remove('show');
  gameState = 'playing';
}

function attack() {
  if (attackCooldown > 0 || gameState !== 'playing') return;
  attackCooldown = 0.4;
  
  const charData = BRAINROT_CHARS[selectedChar];
  const range = CONFIG.player.attackRange;
  
  enemies.forEach(enemy => {
    const dist = player.position.distanceTo(enemy.position);
    if (dist < range) {
      enemy.userData.health -= charData.damage;
      // Knockback
      const dir = enemy.position.clone().sub(player.position).normalize();
      enemy.position.add(dir.multiplyScalar(1.5));
      
      if (enemy.userData.health <= 0) {
        score += enemy.userData.score;
        addKillMsg(`💀 ${enemy.userData.name} eliminated! +${enemy.userData.score}`);
        spawnCoin(enemy.position);
        scene.remove(enemy);
        enemies = enemies.filter(e => e !== enemy);
      }
    }
  });
}

function dash() {
  if (dashCooldown > 0 || gameState !== 'playing') return;
  isDashing = true;
  dashTimer = CONFIG.player.dashDuration;
  dashCooldown = CONFIG.player.dashCooldown;
}

function update(dt) {
  if (gameState !== 'playing' || !player) return;

  // Player movement (keyboard)
  let dx = 0, dz = 0;
  if (keys['a'] || keys['arrowleft']) dx = -1;
  if (keys['d'] || keys['arrowright']) dx = 1;
  if (keys['w'] || keys['arrowup']) dz = -1;
  if (keys['s'] || keys['arrowdown']) dz = 1;
  if (keys[' ']) dash();
  if (keys['e'] || keys['j']) attack();
  
  // Mobile joystick
  if (joyActive) { dx = moveDir.x; dz = moveDir.z; }
  
  const mag = Math.sqrt(dx*dx + dz*dz);
  if (mag > 0) { dx /= mag; dz /= mag; }

  const speed = isDashing ? CONFIG.player.dashSpeed : CONFIG.player.speed * BRAINROT_CHARS[selectedChar].speed;
  player.position.x += dx * speed * dt;
  player.position.z += dz * speed * dt;

  // Face direction
  if (mag > 0.1) {
    const targetAngle = Math.atan2(dx, dz);
    player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, targetAngle, 0.15);
  }

  // Arena bounds
  const half = CONFIG.arena.size / 2 - 0.5;
  player.position.x = THREE.MathUtils.clamp(player.position.x, -half, half);
  player.position.z = THREE.MathUtils.clamp(player.position.z, -half, half);

  // Bobbing animation
  player.position.y = Math.sin(clock.elapsedTime * 3) * 0.05;
  if (player.userData.ring) {
    player.userData.ring.rotation.z += dt * 2;
    player.userData.ring.material.opacity = 0.3 + Math.sin(clock.elapsedTime * 2) * 0.1;
  }

  // Dash
  if (isDashing) {
    dashTimer -= dt;
    if (dashTimer <= 0) isDashing = false;
  }
  if (dashCooldown > 0) dashCooldown -= dt;
  if (attackCooldown > 0) attackCooldown -= dt;

  // Enemies
  enemies.forEach(enemy => {
    const dir = player.position.clone().sub(enemy.position).normalize();
    enemy.position.add(dir.multiplyScalar(enemy.userData.speed * dt));
    enemy.userData.body.rotation.y += enemy.userData.rotSpeed * dt;
    enemy.userData.body.rotation.x += enemy.userData.rotSpeed * 0.5 * dt;
    
    // Collision with player
    const dist = player.position.distanceTo(enemy.position);
    if (dist < 1.0 && !isDashing) {
      health -= enemy.userData.damage * dt;
      // Push player away
      const pushDir = player.position.clone().sub(enemy.position).normalize();
      player.position.add(pushDir.multiplyScalar(3 * dt));
    }
    
    // Dash kills enemies
    if (isDashing && dist < 1.5) {
      enemy.userData.health -= 50;
      if (enemy.userData.health <= 0) {
        score += enemy.userData.score;
        addKillMsg(`💨 Dashed through ${enemy.userData.name}! +${enemy.userData.score}`);
        spawnCoin(enemy.position);
        scene.remove(enemy);
        enemies = enemies.filter(e => e !== enemy);
      }
    }
  });

  // Coins
  coins.forEach(coin => {
    coin.userData.time += dt;
    coin.position.y = 0.5 + Math.sin(coin.userData.time * 3) * 0.15;
    coin.rotation.y += dt * 4;
    
    if (player.position.distanceTo(coin.position) < 1.0) {
      score += coin.userData.value;
      scene.remove(coin);
      coins = coins.filter(c => c !== coin);
    }
  });

  // Spawn enemies
  if (enemies.length < Math.min(CONFIG.enemies.maxCount, wave * CONFIG.waves.enemiesPerWave)) {
    const typeIndex = Math.min(Math.floor(Math.random() * (1 + Math.floor(wave / 2))), ENEMY_TYPES.length - 1);
    const enemy = createEnemy(ENEMY_TYPES[typeIndex]);
    scene.add(enemy);
    enemies.push(enemy);
  }

  // Wave progression
  const newWave = Math.floor(score / 100) + 1;
  if (newWave > wave) {
    wave = newWave;
    addKillMsg(`🌊 Wave ${wave}!`);
  }

  // Death
  if (health <= 0) {
    gameState = 'gameover';
    document.getElementById('final-score').textContent = score;
    document.getElementById('go-msg').textContent = DEATH_MSGS[Math.floor(Math.random() * DEATH_MSGS.length)];
    document.getElementById('gameover').classList.add('show');
  }

  // Camera follow
  camera.position.set(
    player.position.x - Math.sin(CONFIG.camera.angle) * CONFIG.camera.distance,
    CONFIG.camera.height,
    player.position.z + Math.cos(CONFIG.camera.angle) * CONFIG.camera.distance
  );
  camera.lookAt(player.position.x, 1, player.position.z);

  updateUI();
}

function updateUI() {
  document.getElementById('score').textContent = `Score: ${score}`;
  document.getElementById('level').textContent = `Wave ${wave}`;
  const charData = BRAINROT_CHARS[selectedChar];
  const pct = Math.max(0, health / charData.health * 100);
  document.getElementById('health-fill').style.width = pct + '%';
  document.getElementById('health-fill').style.background = pct > 50 ? 'linear-gradient(90deg,#44ff44,#88ff88)' : pct > 25 ? 'linear-gradient(90deg,#ffaa00,#ffcc44)' : 'linear-gradient(90deg,#ff2222,#ff6666)';
}

// === GAME LOOP ===
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
}

// === INIT ===
initScene();
animate();

// Menu
document.querySelectorAll('.char-select:not(.locked)').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.char-select').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    selectedChar = el.dataset.char;
  });
});
document.getElementById('btn-play').addEventListener('click', startGame);
document.getElementById('btn-practice').addEventListener('click', startGame);
document.getElementById('btn-retry').addEventListener('click', startGame);
document.getElementById('btn-menu').addEventListener('click', () => {
  document.getElementById('gameover').classList.remove('show');
  document.getElementById('menu').classList.remove('hidden');
  gameState = 'menu';
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
