<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BrainRotBattle.io</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#dbeafe;font-family:'Nunito',sans-serif;}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;}
.screen.active{display:flex;}

/* ── MENU ── */
#s-menu{background:linear-gradient(150deg,#e0f2fe 0%,#f0fdf4 60%,#fef9c3 100%);}
.logo{font-family:'Fredoka One',cursive;font-size:clamp(2.5rem,7vw,5rem);color:#1e3a5f;text-shadow:0 3px 0 rgba(0,0,0,.07);animation:bob 2.8s ease-in-out infinite;margin-bottom:4px;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.tagline{font-size:.85rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#64748b;margin-bottom:28px;}

.skin-picker{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.sp-arrow{width:36px;height:36px;border-radius:50%;border:none;background:rgba(30,58,95,.1);cursor:pointer;font-size:1.1rem;color:#1e3a5f;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.sp-arrow:hover{background:rgba(30,58,95,.2);transform:scale(1.1);}
.sp-cards{display:flex;gap:8px;}
.sp-card{width:68px;height:68px;border-radius:16px;border:3px solid transparent;cursor:pointer;background:white;box-shadow:0 3px 12px rgba(0,0,0,.1);overflow:hidden;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.sp-card:hover{transform:scale(1.05);}
.sp-card.active{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.2),0 3px 12px rgba(0,0,0,.15);transform:scale(1.08);}
.sp-card canvas{display:block;pointer-events:none;}

.name-inp{background:white;border:2px solid #e2e8f0;border-radius:14px;padding:12px 20px;font-size:1rem;font-family:'Nunito',sans-serif;color:#1e3a5f;outline:none;width:220px;text-align:center;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:border .2s;}
.name-inp:focus{border-color:#3b82f6;}
.name-inp::placeholder{color:#94a3b8;}

.btn-play{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white;border:none;padding:14px 56px;font-size:1.2rem;font-family:'Fredoka One',cursive;border-radius:100px;cursor:pointer;box-shadow:0 5px 20px rgba(59,130,246,.4);transition:all .2s;letter-spacing:.5px;margin-bottom:10px;}
.btn-play:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(59,130,246,.5);}
.btn-play:active{transform:translateY(0);}
.hint{font-size:.75rem;color:#94a3b8;font-weight:600;}

/* ── CONNECTING ── */
#s-connecting{background:linear-gradient(150deg,#e0f2fe,#f0fdf4);}
.conn-text{font-family:'Fredoka One',cursive;font-size:1.8rem;color:#1e3a5f;margin-top:16px;}
.spinner{width:48px;height:48px;border:4px solid #bfdbfe;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── GAME ── */
#s-game{background:#dbeafe;}
#c3d{position:absolute;inset:0;display:block;}

/* HUD */
.hud{position:absolute;pointer-events:none;z-index:50;}
.hud-tl{top:14px;left:14px;}
.hud-tr{top:14px;right:14px;}
.hud-br{bottom:14px;right:14px;}

.card{background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-radius:16px;border:1px solid rgba(255,255,255,.9);box-shadow:0 3px 16px rgba(0,0,0,.08);}

.score-card{padding:10px 18px;}
.score-lbl{font-size:.62rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#94a3b8;}
.score-val{font-family:'Fredoka One',cursive;font-size:1.7rem;color:#1e3a5f;line-height:1.1;}

.lb-card{padding:12px 14px;min-width:162px;}
.lb-title{font-size:.62rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#3b82f6;margin-bottom:7px;text-align:center;}
.lb-row{display:flex;justify-content:space-between;padding:3px 0;font-size:.78rem;color:#475569;border-bottom:1px solid #f1f5f9;gap:6px;}
.lb-row:last-child{border:none;}
.lb-row.me{color:#1d4ed8;font-weight:800;}
.lb-num{color:#cbd5e1;font-size:.7rem;width:12px;}

.mm-card{padding:8px;}
.mm-lbl{font-size:.6rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#94a3b8;text-align:center;margin-bottom:5px;}
#minimap{border-radius:8px;display:block;}

/* Skill bar */
#skillbar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:60;pointer-events:all;}
.sk{width:58px;height:58px;border-radius:15px;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.6rem;position:relative;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.09);transition:all .15s;}
.sk:hover{transform:scale(1.08);}
.sk.active{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.3);}
.sk-key{position:absolute;bottom:3px;right:5px;font-size:.56rem;font-weight:800;color:#94a3b8;}
.sk-cd{position:absolute;inset:0;background:rgba(255,255,255,.75);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.1rem;color:#1e3a5f;border-radius:14px;}

/* ── RESULTS ── */
#s-death{background:linear-gradient(150deg,#e0f2fe 0%,#f0fdf4 60%,#fef9c3 100%);overflow-y:auto;}
.res-title{font-family:'Fredoka One',cursive;font-size:2.6rem;margin-bottom:2px;}
.res-title.dead{color:#ef4444;}
.res-title.win{color:#22c55e;}
.res-sub{font-size:.8rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#94a3b8;margin-bottom:18px;}
.res-card{background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-radius:20px;border:1px solid rgba(255,255,255,.95);box-shadow:0 6px 24px rgba(0,0,0,.07);padding:20px 24px;width:100%;max-width:340px;margin-bottom:12px;}
.res-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.res-stat{background:#f8fafc;border-radius:12px;padding:10px;text-align:center;}
.res-stat-num{font-family:'Fredoka One',cursive;font-size:1.4rem;color:#1e3a5f;}
.res-stat-lbl{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#94a3b8;}
/* XP bar */
.xp-section{margin-top:4px;}
.xp-header{display:flex;justify-content:space-between;font-size:.75rem;font-weight:800;color:#64748b;margin-bottom:6px;}
.xp-track{width:100%;height:12px;background:#e2e8f0;border-radius:100px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:100px;transition:width 1.2s cubic-bezier(.22,1,.36,1);}
.xp-gained{font-family:'Fredoka One',cursive;font-size:1rem;color:#3b82f6;text-align:center;margin-top:6px;}
/* Level up */
.levelup-badge{background:linear-gradient(135deg,#f59e0b,#f97316);color:white;font-family:'Fredoka One',cursive;font-size:1rem;padding:8px 20px;border-radius:100px;text-align:center;margin:8px 0;box-shadow:0 4px 16px rgba(245,158,11,.4);animation:pop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
/* HUD profile pill */
.hud-profile{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border-radius:100px;padding:5px 12px 5px 5px;border:1px solid rgba(255,255,255,.9);box-shadow:0 2px 12px rgba(0,0,0,.07);}
.hud-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:.75rem;color:white;}
.hud-lvl{font-family:'Fredoka One',cursive;font-size:.82rem;color:#1e3a5f;}
.hud-coins{font-size:.75rem;font-weight:800;color:#f59e0b;margin-left:2px;}

/* Ping */
#ping{position:absolute;bottom:14px;left:14px;font-size:.7rem;font-weight:700;color:#94a3b8;z-index:60;}

/* Floating name labels */
.name-label{position:absolute;pointer-events:none;z-index:55;white-space:nowrap;font-family:'Fredoka One',cursive;font-size:.75rem;letter-spacing:.5px;transform:translateX(-50%);padding:2px 7px;border-radius:20px;backdrop-filter:blur(6px);border:1.5px solid rgba(255,255,255,.4);box-shadow:0 2px 8px rgba(0,0,0,.15);transition:opacity .2s;}
#name-labels{position:absolute;inset:0;pointer-events:none;z-index:55;overflow:hidden;}
</style>
</head>
<body>

<!-- MENU -->
<div id="s-menu" class="screen active">
  <div class="logo">🧠 BrainRotBattle.io</div>
  <div class="tagline">Italian Brainrot Territory Battle</div>
  <div class="skin-picker">
    <button class="sp-arrow" onclick="shiftSkin(-1)">◀</button>
    <div class="sp-cards" id="spCards"></div>
    <button class="sp-arrow" onclick="shiftSkin(1)">▶</button>
  </div>
  <input class="name-inp" id="nameInp" placeholder="Il tuo nome..." maxlength="14"/>
  <button class="btn-play" onclick="joinGame()">GIOCA! 🍕</button>
  <div class="hint">WASD · Frecce · Q E R = Abilità</div>
</div>

<!-- CONNECTING -->
<div id="s-connecting" class="screen">
  <div class="spinner"></div>
  <div class="conn-text">Connessione...</div>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <canvas id="c3d"></canvas>
  <!-- HUD -->
  <div class="hud hud-tl" style="display:flex;flex-direction:column;gap:7px;">
    <div class="hud-profile" id="hudProfile" style="display:none;">
      <div class="hud-avatar" id="hudAvatar">?</div>
      <div>
        <div class="hud-lvl">Lv.<span id="hudLevel">1</span></div>
        <div class="hud-coins">🧠 <span id="hudCoins">0</span></div>
      </div>
    </div>
    <div class="card score-card">
      <div class="score-lbl">Territorio</div>
      <div class="score-val" id="scoreVal">0.0%</div>
    </div>
  </div>
  <div class="hud hud-tr">
    <div class="card lb-card">
      <div class="lb-title">🏅 Classifica</div>
      <div id="lbRows"></div>
    </div>
  </div>
  <div class="hud hud-br">
    <div class="card mm-card">
      <div class="mm-lbl">Mappa</div>
      <canvas id="minimap" width="110" height="110"></canvas>
    </div>
  </div>
  <div id="skillbar">
    <div class="sk" id="sk0" onclick="useSkill(0)">⚡<span class="sk-key">Q</span></div>
    <div class="sk" id="sk1" onclick="useSkill(1)">🛡️<span class="sk-key">E</span></div>
    <div class="sk" id="sk2" onclick="useSkill(2)">💨<span class="sk-key">R</span></div>
  </div>
  <div id="ping">0ms</div>
  <div id="name-labels"></div>
</div>

<!-- RESULTS -->
<div id="s-death" class="screen">
  <div id="resIcon" style="font-size:3.2rem;margin-bottom:4px;">💀</div>
  <div class="res-title" id="resTitle">Sei morto!</div>
  <div class="res-sub" id="resSub">PARTITA FINITA</div>

  <!-- Stats card -->
  <div class="res-card">
    <div class="res-stats">
      <div class="res-stat">
        <div class="res-stat-num" id="resTerr">0%</div>
        <div class="res-stat-lbl">Territorio</div>
      </div>
      <div class="res-stat">
        <div class="res-stat-num" id="resRank">#?</div>
        <div class="res-stat-lbl">Posizione</div>
      </div>
      <div class="res-stat">
        <div class="res-stat-num" id="resCoins">+0 🧠</div>
        <div class="res-stat-lbl">BrainCoins</div>
      </div>
      <div class="res-stat">
        <div class="res-stat-num" id="resTime">0s</div>
        <div class="res-stat-lbl">Durata</div>
      </div>
    </div>
  </div>

  <!-- XP card (only for logged-in) -->
  <div class="res-card" id="resXpCard" style="display:none;">
    <div id="resLevelUp" class="levelup-badge" style="display:none;">🎉 LEVEL UP! Livello <span id="resNewLevel">2</span>!</div>
    <div class="xp-section">
      <div class="xp-header">
        <span>Livello <span id="resLevel">1</span></span>
        <span id="resXpText">0 / 100 XP</span>
      </div>
      <div class="xp-track"><div class="xp-fill" id="resXpFill" style="width:0%"></div></div>
      <div class="xp-gained" id="resXpGained">+0 XP</div>
    </div>
  </div>

  <!-- Skin picker -->
  <div class="skin-picker" id="deathPicker">
    <button class="sp-arrow" onclick="shiftSkin(-1)">◀</button>
    <div class="sp-cards" id="spCardsD"></div>
    <button class="sp-arrow" onclick="shiftSkin(1)">▶</button>
  </div>

  <button class="btn-play" onclick="respawn()">Riprova! 🍕</button>
  <button style="margin-top:8px;background:none;border:none;color:#94a3b8;font-size:.85rem;cursor:pointer;font-family:Nunito,sans-serif;" onclick="goMenu()">← Menu principale</button>
</div>

<!-- Scripts -->
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
'use strict';

// ═══════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════
const COLS=100, ROWS=100, CELL=2.4;
const WW=COLS*CELL, HH=ROWS*CELL;
const SKIN_SHAPES=['sphere','box','torus','cone','diamond','icosa'];
const SKIN_NAMES=['🐊 Croco','🦁 Leone','🐸 Rana','🐙 Polpo','💎 Diamante','⭐ Stella'];
const SDEFS=[{cd:8,dur:3},{cd:12,dur:4},{cd:6,dur:2.5}];

let selSkin=0, skinOffset=0;

// ═══════════════════════════════════════════
//  SKIN PREVIEWS
// ═══════════════════════════════════════════
function makeShapeGeo(s){
  if(s==='sphere')  return new THREE.SphereGeometry(.65,20,16);
  if(s==='box')     return new THREE.BoxGeometry(1,1,1);
  if(s==='torus')   return new THREE.TorusGeometry(.52,.24,10,28);
  if(s==='cone')    return new THREE.ConeGeometry(.6,1.1,10);
  if(s==='diamond') return new THREE.OctahedronGeometry(.72);
  return new THREE.IcosahedronGeometry(.68,0);
}

const PREVIEW_COLORS=['#3b82f6','#ef4444','#22c55e','#f59e0b','#a855f7','#06b6d4'];

function buildSkinPreviews(containerId){
  const wrap=document.getElementById(containerId);
  if(!wrap) return;
  wrap.innerHTML='';
  for(let i=0;i<3;i++){
    const idx=(skinOffset+i)%SKIN_SHAPES.length;
    const card=document.createElement('div');
    card.className='sp-card'+(idx===selSkin?' active':'');
    const cvs=document.createElement('canvas');cvs.width=cvs.height=58;
    card.appendChild(cvs);
    card.onclick=()=>{selSkin=idx;buildSkinPreviews('spCards');buildSkinPreviews('spCardsD');};
    wrap.appendChild(card);
    animateSkinPreview(cvs,idx);
  }
}

function animateSkinPreview(cvs,idx){
  const r=new THREE.WebGLRenderer({canvas:cvs,antialias:true,alpha:true});
  r.setSize(58,58);r.setClearColor(0,0);
  const s=new THREE.Scene();
  s.add(new THREE.AmbientLight(0xffffff,1.6));
  const dl=new THREE.DirectionalLight(0xffffff,1.2);dl.position.set(2,4,3);s.add(dl);
  const cam=new THREE.PerspectiveCamera(38,1,.1,100);cam.position.set(0,1.4,3.2);cam.lookAt(0,.4,0);
  const c=new THREE.Color(PREVIEW_COLORS[idx%PREVIEW_COLORS.length]);
  const mesh=new THREE.Mesh(makeShapeGeo(SKIN_SHAPES[idx]),new THREE.MeshStandardMaterial({color:c,roughness:.25,metalness:.55}));
  mesh.position.y=.4;s.add(mesh);
  let t=0,alive=true;
  function anim(){if(!alive||!cvs.isConnected)return;requestAnimationFrame(anim);t+=.022;mesh.rotation.y=t;mesh.rotation.x=Math.sin(t*.6)*.25;r.render(s,cam);}
  anim();
  // cleanup on disconnect
  const obs=new MutationObserver(()=>{if(!cvs.isConnected){alive=false;obs.disconnect();}});
  obs.observe(document.body,{childList:true,subtree:true});
}

function shiftSkin(d){
  skinOffset=(skinOffset+d+SKIN_SHAPES.length)%SKIN_SHAPES.length;
  selSkin=(selSkin+d+SKIN_SHAPES.length)%SKIN_SHAPES.length;
  buildSkinPreviews('spCards');buildSkinPreviews('spCardsD');
}

buildSkinPreviews('spCards');

// ═══════════════════════════════════════════
//  SCREEN MANAGER
// ═══════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goMenu(){showScreen('s-menu');if(socket){socket.disconnect();socket=null;}buildSkinPreviews('spCards');}

// ═══════════════════════════════════════════
//  THREE.JS
// ═══════════════════════════════════════════
const canvas3d=document.getElementById('c3d');
const renderer=new THREE.WebGLRenderer({canvas:canvas3d,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.05;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xdbeafe);
scene.fog=new THREE.FogExp2(0xdbeafe,.006);

const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.1,800);
camera.position.set(0,38,30);camera.lookAt(0,0,0);

scene.add(new THREE.AmbientLight(0xffffff,1.5));
const sun=new THREE.DirectionalLight(0xfff8e7,1.5);
sun.position.set(40,80,40);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1;sun.shadow.camera.far=400;
sun.shadow.camera.left=sun.shadow.camera.bottom=-140;sun.shadow.camera.right=sun.shadow.camera.top=140;
scene.add(sun);
const fillLight=new THREE.DirectionalLight(0xe0f2fe,.5);fillLight.position.set(-20,30,-20);scene.add(fillLight);

// Floor
const floor=new THREE.Mesh(new THREE.PlaneGeometry(WW+8,HH+8),new THREE.MeshStandardMaterial({color:0xf0f9ff,roughness:.95,metalness:0}));
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);
const gh=new THREE.GridHelper(WW,COLS,0xdde8f0,0xdde8f0);gh.position.y=.015;scene.add(gh);

// Walls
const wm=new THREE.MeshStandardMaterial({color:0xbfdbfe,roughness:.7});
[[0,-(HH/2+CELL/2),WW+CELL*2,CELL],[0,HH/2+CELL/2,WW+CELL*2,CELL],[-(WW/2+CELL/2),0,CELL,HH+CELL*2],[WW/2+CELL/2,0,CELL,HH+CELL*2]]
.forEach(([x,z,w,d])=>{const m=new THREE.Mesh(new THREE.BoxGeometry(w,3,d),wm);m.position.set(x,1.5,z);scene.add(m);});

// ═══════════════════════════════════════════
//  TILE SYSTEM
// ═══════════════════════════════════════════
const tileGeo=new THREE.BoxGeometry(CELL*.95,.22,CELL*.95);
const tileMeshes=new Map(), tileMats={};
function getTileMat(hex){
  if(!tileMats[hex]){const c=new THREE.Color(hex);tileMats[hex]=new THREE.MeshStandardMaterial({color:c,roughness:.5,metalness:.15,transparent:true,opacity:.82});}
  return tileMats[hex];
}
function cw(cx,cy){return{x:(cx-COLS/2+.5)*CELL,z:(cy-ROWS/2+.5)*CELL};}
function setTile3d(cx,cy,hex){
  const k=`${cx},${cy}`;
  if(tileMeshes.has(k)){const m=tileMeshes.get(k);if(!hex){scene.remove(m);tileMeshes.delete(k);}else m.material=getTileMat(hex);return;}
  if(!hex)return;
  const m=new THREE.Mesh(tileGeo,getTileMat(hex));const{x,z}=cw(cx,cy);m.position.set(x,.11,z);m.receiveShadow=true;scene.add(m);tileMeshes.set(k,m);
}

// Trail cylinders
const trGeo=new THREE.CylinderGeometry(.26,.26,.35,8);
const trMeshes=new Map(), trMats={};
function getTrailMat(hex){
  if(!trMats[hex]){const c=new THREE.Color(hex);trMats[hex]=new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:.55,roughness:.2,metalness:.5});}
  return trMats[hex];
}
function setTrailMesh(sid,cx,cy,hex,show){
  const k=`${sid}|${cx},${cy}`;
  if(!show){if(trMeshes.has(k)){scene.remove(trMeshes.get(k));trMeshes.delete(k);}return;}
  if(trMeshes.has(k))return;
  const m=new THREE.Mesh(trGeo,getTrailMat(hex));const{x,z}=cw(cx,cy);m.position.set(x,.18,z);scene.add(m);trMeshes.set(k,m);
}
function clearTrailMeshes(sid){
  for(const[k]of trMeshes){if(k.startsWith(sid+'|')){scene.remove(trMeshes.get(k));trMeshes.delete(k);}}
}

// ═══════════════════════════════════════════
//  ENTITY MESHES
// ═══════════════════════════════════════════
const entityMeshes=new Map();

function makeEntityMesh(hex,skinIdx,name){
  const g=new THREE.Group();
  const c=new THREE.Color(hex);
  const mat=new THREE.MeshStandardMaterial({color:c,roughness:.25,metalness:.6});
  const body=new THREE.Mesh(makeShapeGeo(SKIN_SHAPES[skinIdx%SKIN_SHAPES.length]),mat);
  body.castShadow=true;body.position.y=.9;g.add(body);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(.88,.08,6,32),new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:.85,transparent:true,opacity:.6}));
  ring.rotation.x=Math.PI/2;ring.position.y=.1;g.add(ring);
  g._body=body;g._mat=mat;g._ring=ring;g._name=name;g._color=hex;
  return g;
}

function getOrCreateEntityMesh(sid,hex,skinIdx,name){
  if(entityMeshes.has(sid)) return entityMeshes.get(sid);
  const m=makeEntityMesh(hex,skinIdx,name);scene.add(m);entityMeshes.set(sid,m);
  return m;
}
function removeEntityMesh(sid){
  if(entityMeshes.has(sid)){scene.remove(entityMeshes.get(sid));entityMeshes.delete(sid);}
}

// ═══════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════
const parts=[];const pGeo=new THREE.SphereGeometry(.13,5,4);
function burst(wx,wz,hex,n=10){
  const c=new THREE.Color(hex);
  for(let i=0;i<n;i++){
    const m=new THREE.Mesh(pGeo,new THREE.MeshBasicMaterial({color:c,transparent:true}));
    m.position.set(wx+(Math.random()-.5)*.5,.5,wz+(Math.random()-.5)*.5);
    const a=Math.random()*Math.PI*2,s=.06+Math.random()*.18;
    m._vx=Math.cos(a)*s;m._vz=Math.sin(a)*s;m._vy=.1+Math.random()*.15;m._life=1;
    scene.add(m);parts.push(m);
  }
}
function tickParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p._life-=dt*1.5;
    if(p._life<=0){scene.remove(p);parts.splice(i,1);continue;}
    p.position.x+=p._vx;p.position.y+=p._vy;p.position.z+=p._vz;p._vy-=.006;
    p.material.opacity=p._life;
  }
}

// ═══════════════════════════════════════════
//  MINIMAP
// ═══════════════════════════════════════════
const mmCvs=document.getElementById('minimap'),mmCtx=mmCvs.getContext('2d');
const MM=110;
function drawMinimap(){
  mmCtx.fillStyle='#e0f2fe';mmCtx.fillRect(0,0,MM,MM);
  const cs=MM/COLS;
  for(const[k,info]of tileColorMap){
    const[cx,cy]=k.split(',').map(Number);
    mmCtx.fillStyle=info+'88';mmCtx.fillRect(cx*cs,cy*cs,cs+.5,cs+.5);
  }
  for(const[sid,state]of playerStates){
    if(!state.alive)continue;
    mmCtx.fillStyle=state.color;
    const ex=state.x/COLS*MM,ey=state.y/ROWS*MM;
    mmCtx.beginPath();mmCtx.arc(ex,ey,sid===mySid?3.5:2,0,Math.PI*2);mmCtx.fill();
  }
  mmCtx.strokeStyle='#93c5fd';mmCtx.lineWidth=1.5;mmCtx.strokeRect(1,1,MM-2,MM-2);
}

// ═══════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════
let socket=null, mySid=null, myColor='#3b82f6';
let playerStates=new Map(); // sid -> {x,y,alive,score,color,skin,trail,dx,dy,_tx,_tz}
let tileColorMap=new Map(); // "cx,cy" -> hex

let keys={}, animT=0, lastT=0;
let camCX=0, camCZ=0;
let sCD=[0,0,0], sActive=[false,false,false], sTmr=[0,0,0];
let pingStart=0, pingMs=0;

// ═══════════════════════════════════════════
//  SOCKET CONNECTION
// ═══════════════════════════════════════════
function joinGame(){
  const params = new URLSearchParams(window.location.search);
  window._lobbyBase = params.get('lobby') || 'http://46.225.224.163:3000';
  _gameStartTime = Date.now();
  const name=document.getElementById('nameInp').value.trim()||'Anonimo';
  showScreen('s-connecting');

  socket=io();

  socket.on('connect',()=>{
    socket.emit('join',{name,skin:selSkin});
  });

  socket.on('init',(data)=>{
    mySid=data.mySid;
    myColor=data.myColor;
    camCX=0;camCZ=0;

    // Clear scene entities
    for(const sid of entityMeshes.keys()) removeEntityMesh(sid);
    tileMeshes.forEach(m=>scene.remove(m));tileMeshes.clear();
    trMeshes.forEach(m=>scene.remove(m));trMeshes.clear();
    tileColorMap.clear();playerStates.clear();
    parts.forEach(p=>scene.remove(p));parts.length=0;

    // Build grid
    data.grid.forEach(t=>{setTile3d(t.x,t.y,t.color);tileColorMap.set(`${t.x},${t.y}`,t.color);});

    // Build players
    data.players.forEach(p=>{
      playerStates.set(p.sid,{x:p.x,y:p.y,alive:p.alive,score:p.score,color:p.color,skin:p.skin,trail:p.trail||[],dx:1,dy:0,_tx:cw(p.x,p.y).x,_tz:cw(p.x,p.y).z,name:p.name,isBot:p.isBot});
      const m=getOrCreateEntityMesh(p.sid,p.color,p.skin,p.name);
      const{x,z}=cw(p.x,p.y);m.position.set(x,0,z);
    });

    sCD=[0,0,0];sActive=[false,false,false];sTmr=[0,0,0];updateSkillUI();
    showScreen('s-game');
    lastT=performance.now();
  });

  socket.on('step',(data)=>{
    // Update positions
    (data.positions||data.players||[]).forEach(p=>{
      const state=playerStates.get(p.sid);
      if(!state)return;
      state.x=p.x;state.y=p.y;state.alive=p.alive;
      const{x,z}=cw(p.x,p.y);state._tx=x;state._tz=z;
    });
    // Update scores separately
    (data.scores||[]).forEach(s=>{
      const state=playerStates.get(s.sid);if(state)state.score=s.score;
    });
    // Tiles
    data.tiles.forEach(t=>{
      setTile3d(t.x,t.y,t.color);
      if(t.color)tileColorMap.set(`${t.x},${t.y}`,t.color);
      else tileColorMap.delete(`${t.x},${t.y}`);
    });
    // Trails
    data.trails.forEach(tr=>{
      const state=playerStates.get(tr.sid);if(!state)return;
      if(tr.clear){clearTrailMeshes(tr.sid);state.trail=[];}
      else{
        const newSet=new Set(tr.trail.map(t=>`${t.x},${t.y}`));
        for(const[k]of trMeshes){if(k.startsWith(tr.sid+'|')){const pos=k.split('|')[1];if(!newSet.has(pos)){scene.remove(trMeshes.get(k));trMeshes.delete(k);}}}
        tr.trail.forEach(t=>setTrailMesh(tr.sid,t.x,t.y,state.color,true));
        state.trail=tr.trail;
      }
    });
    // Deaths
    data.deaths.forEach(sid=>{
      const state=playerStates.get(sid);
      if(!state)return;
      state.alive=false;
      clearTrailMeshes(sid);
      const{x,z}=cw(state.x,state.y);burst(x,z,state.color,12);
      if(sid===mySid){
        const finalScore = state.score||0;
        const rank = calcMyRank();
        const elapsed = Math.floor((Date.now()-_gameStartTime)/1000);
        buildSkinPreviews('spCardsD');
        setTimeout(()=>showResultsScreen(finalScore, rank, elapsed), 600);
      }
    });
  });

  socket.on('playerJoined',(p)=>{
    playerStates.set(p.sid,{x:p.x,y:p.y,alive:true,score:0,color:p.color,skin:p.skin,trail:[],dx:1,dy:0,_tx:cw(p.x,p.y).x,_tz:cw(p.x,p.y).z,name:p.name,isBot:p.isBot});
    const m=getOrCreateEntityMesh(p.sid,p.color,p.skin,p.name);
    const{x,z}=cw(p.x,p.y);m.position.set(x,0,z);
  });

  socket.on('playerLeft',(sid)=>{
    playerStates.delete(sid);
    removeEntityMesh(sid);
    clearTrailMeshes(sid);
  });

  socket.on('playerRespawned',(data)=>{
    const state=playerStates.get(data.sid);if(!state)return;
    state.alive=true;state.x=data.x;state.y=data.y;state.trail=[];
    const{x,z}=cw(data.x,data.y);state._tx=x;state._tz=z;
    if(data.skin!==undefined){state.skin=data.skin;removeEntityMesh(data.sid);getOrCreateEntityMesh(data.sid,state.color,data.skin);}
  });

  socket.on('respawned',(data)=>{
    const state=playerStates.get(mySid);if(!state)return;
    data.grid.forEach(t=>{setTile3d(t.x,t.y,t.color);tileColorMap.set(`${t.x},${t.y}`,t.color);});
    showScreen('s-game');
  });

  socket.on('disconnect',()=>{
    if(document.getElementById('s-game').classList.contains('active'))goMenu();
  });

  // Server tells us skill cooldown
  socket.on('skillCd',({skill,cd})=>{
    sCD[skill]=cd; sActive[skill]=false; updateSkillUI();
  });

  // Visual effect when someone uses a skill
  socket.on('skill',({sid,skill,dur,x,y})=>{
    const state=playerStates.get(sid);if(!state)return;
    const{x:wx,z:wz}=cw(state.x,state.y);
    if(skill===0){// Fulmine - yellow burst
      burst(wx,wz,'#f59e0b',14);
      if(sid===mySid){sActive[0]=true;sTmr[0]=dur||3;updateSkillUI();}
    } else if(skill===1){// Scudo - blue shield flash
      burst(wx,wz,'#3b82f6',10);
      if(sid===mySid){sActive[1]=true;sTmr[1]=dur||5;updateSkillUI();}
    } else if(skill===2){// Turbo - cyan trail burst
      burst(wx,wz,'#06b6d4',16);
    }
  });

  // Ping
  setInterval(()=>{pingStart=Date.now();socket.emit('ping');},2000);
  socket.on('pong_',()=>{pingMs=Date.now()-pingStart;document.getElementById('ping').textContent=pingMs+'ms';});
}

function calcMyRank() {
  const scores = Array.from(playerStates.values()).filter(p=>!p.isBot).map(p=>p.score);
  scores.sort((a,b)=>b-a);
  const myScore = playerStates.get(mySid)?.score||0;
  return scores.indexOf(myScore)+1 || scores.length;
}

async function showResultsScreen(territory, rank, elapsed) {
  // Fill basic stats
  document.getElementById('resTerr').textContent = territory.toFixed(1)+'%';
  document.getElementById('resRank').textContent = '#'+rank;
  document.getElementById('resTime').textContent = elapsed>60 ? Math.floor(elapsed/60)+'m '+( elapsed%60)+'s' : elapsed+'s';

  // Coins estimate (even for guests show something)
  const coins = Math.floor(5 + territory + (rank===1?20:0));
  document.getElementById('resCoins').textContent = '+'+coins+' 🧠';

  // Title
  const isTop3 = rank<=3;
  document.getElementById('resIcon').textContent = rank===1?'🏆':rank<=3?'🥈':'💀';
  document.getElementById('resTitle').textContent = rank===1?'Vittoria!':rank<=3?'Ottimo!':'Sei morto!';
  document.getElementById('resTitle').className = 'res-title '+(isTop3?'win':'dead');
  document.getElementById('resSub').textContent = isTop3?'OTTIMA PARTITA!':'PARTITA FINITA';

  showScreen('s-death');

  // XP - only for logged-in users
  const token = window._authToken;
  if (!token) return;

  const lobbyBase = window._lobbyBase || 'http://46.225.224.163:3000';
  try {
    const r = await fetch(lobbyBase+'/api/game/result', {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ token, territory, won: rank===1 })
    });
    const d = await r.json();
    if (!d.ok) return;

    // Show XP card
    const xpCard = document.getElementById('resXpCard');
    xpCard.style.display = 'block';

    // Level up?
    if (d.levelUp) {
      const lu = document.getElementById('resLevelUp');
      lu.style.display = 'block';
      document.getElementById('resNewLevel').textContent = d.newLevel;
    }

    // XP bar animation
    const level = d.newLevel || (window._profile?.level||1);
    const xpForLevel = l => Math.floor(100 * Math.pow(l,1.5));
    const xpNeeded = xpForLevel(level+1) - xpForLevel(level);
    const xpProgress = d.newXp - xpForLevel(level);
    const pct = Math.max(0, Math.min(100, xpProgress/xpNeeded*100));

    document.getElementById('resLevel').textContent = level;
    document.getElementById('resXpText').textContent = xpProgress+' / '+xpNeeded+' XP';
    document.getElementById('resXpGained').textContent = '+'+d.xpGained+' XP';
    document.getElementById('resCoins').textContent = '+'+d.coinsGained+' 🧠';

    // Animate bar
    setTimeout(()=>{ document.getElementById('resXpFill').style.width = pct+'%'; }, 300);

    // Update HUD
    if (window._profile) {
      window._profile.level = level;
      window._profile.coins = (window._profile.coins||0)+d.coinsGained;
      document.getElementById('hudLevel').textContent = level;
      document.getElementById('hudCoins').textContent = window._profile.coins;
    }
  } catch(e) { console.error('XP error:', e); }
}

function respawn(){
  if(!socket)return;
  socket.emit('respawn',{skin:selSkin});
}

// ═══════════════════════════════════════════
//  INPUT → send to server
// ═══════════════════════════════════════════
let lastDir={dx:1,dy:0};
function sendDir(dx,dy){
  if(!socket)return;
  if(dx===lastDir.dx&&dy===lastDir.dy)return;
  lastDir={dx,dy};
  socket.emit('dir',{dx,dy});
}

addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') sendDir(0,-1);
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') sendDir(0,1);
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') sendDir(-1,0);
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') sendDir(1,0);
  if(e.key==='q'||e.key==='Q') useSkill(0);
  if(e.key==='e'||e.key==='E') useSkill(1);
  if(e.key==='r'||e.key==='R') useSkill(2);
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
addEventListener('keyup',e=>{keys[e.key]=false;});

// Touch swipe
let tS={x:0,y:0};
addEventListener('touchstart',e=>{tS={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tS.x,dy=e.changedTouches[0].clientY-tS.y;
  if(Math.abs(dx)>Math.abs(dy)){if(Math.abs(dx)>25){if(dx>0)sendDir(1,0);else sendDir(-1,0);}}
  else{if(Math.abs(dy)>25){if(dy>0)sendDir(0,1);else sendDir(0,-1);}}
},{passive:true});

// ═══════════════════════════════════════════
//  SKILLS (send to server)
// ═══════════════════════════════════════════
function useSkill(i){
  if(sCD[i]>0||sActive[i]||!socket)return;
  socket.emit('skill',{skill:i});
  // Optimistic local feedback
  if(i===2){ burst(0,0,'#06b6d4',8); } // Turbo instant feel
}
function updateSkillUI(){
  for(let i=0;i<3;i++){
    const el=document.getElementById('sk'+i);
    const old=el.querySelector('.sk-cd');if(old)old.remove();
    if(sCD[i]>0){const d=document.createElement('div');d.className='sk-cd';d.textContent=Math.ceil(sCD[i])+'s';el.appendChild(d);}
    el.classList.toggle('active',sActive[i]);
  }
}

// ═══════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════
(function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  animT+=dt;

  // Skills timer
  for(let i=0;i<3;i++){
    if(sActive[i]){sTmr[i]-=dt;if(sTmr[i]<=0)sActive[i]=false;}
    if(sCD[i]>0)sCD[i]=Math.max(0,sCD[i]-dt);
  }
  updateSkillUI();

  // Animate entities
  const lr=Math.min(1,dt*11);
  let myState=null;
  for(const[sid,state]of playerStates){
    if(sid===mySid)myState=state;
    const m=entityMeshes.get(sid);if(!m)continue;
    if(!state.alive){m.visible=false;continue;}
    m.visible=true;
    m.position.x+=(state._tx-m.position.x)*lr;
    m.position.z+=(state._tz-m.position.z)*lr;
    m.position.y=Math.sin(animT*1.6+playerStates.size*.7)*.08;
    if(m._body)m._body.rotation.y+=dt*1.1;
    if(m._ring)m._ring.rotation.z+=dt*1.4;
  }

  // Camera follows me - smoother
  if(myState&&myState.alive){
    const lc=Math.min(1,dt*5);
    camCX+=(myState._tx-camCX)*lc;
    camCZ+=(myState._tz-camCZ)*lc;
    camera.position.x+=(camCX-camera.position.x)*Math.min(1,dt*4);
    camera.position.z+=(camCZ+30-camera.position.z)*Math.min(1,dt*4);
    camera.position.y+=((38)-camera.position.y)*Math.min(1,dt*4);
    camera.lookAt(camCX,0,camCZ);

    // Score & leaderboard
    document.getElementById('scoreVal').textContent=(myState.score||0).toFixed(1)+'%';
    const sorted=[...playerStates.values()].filter(p=>p.alive).sort((a,b)=>b.score-a.score).slice(0,7);
    document.getElementById('lbRows').innerHTML=sorted.map((p,i)=>
      `<div class="lb-row ${p===myState?'me':''}"><span class="lb-num">${i+1}</span><span>${p.name||'?'}</span><span>${(p.score||0).toFixed(1)}%</span></div>`
    ).join('');
  }

  tickParts(dt);
  drawMinimap();
  renderer.render(scene,camera);

  // ── Floating name labels ──
  const labelsDiv=document.getElementById('name-labels');
  const W=innerWidth,H=innerHeight;
  // Reuse/create label elements
  const activeSids=new Set();
  for(const[sid,state]of playerStates){
    if(!state.alive)continue;
    activeSids.add(sid);
    const m=entityMeshes.get(sid);if(!m)continue;
    // Project 3D pos to screen
    const pos3=new THREE.Vector3(m.position.x,m.position.y+2.4,m.position.z);
    pos3.project(camera);
    const sx=(pos3.x+1)/2*W, sy=(-pos3.y+1)/2*H;
    // Only show if in front of camera
    if(pos3.z>1){let el=document.getElementById('nl-'+sid);if(el)el.style.display='none';continue;}
    let el=document.getElementById('nl-'+sid);
    if(!el){
      el=document.createElement('div');
      el.id='nl-'+sid;
      el.className='name-label';
      labelsDiv.appendChild(el);
    }
    const isMine=sid===mySid;
    el.style.left=sx+'px';
    el.style.top=sy+'px';
    el.style.color=state.color;
    el.style.background=isMine?'rgba(255,255,255,.92)':'rgba(255,255,255,.75)';
    el.style.fontWeight=isMine?'bold':'normal';
    el.style.fontSize=isMine?'.82rem':'.72rem';
    el.style.display='block';
    el.textContent=isMine?'★ '+(state.name||'?'):state.name||'?';
  }
  // Remove labels for gone players
  for(const el of labelsDiv.querySelectorAll('.name-label')){
    const sid=el.id.replace('nl-','');
    if(!activeSids.has(sid))el.remove();
  }
})(0);

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// Auto-join if URL has name param (coming from lobby)
window.addEventListener('load',function(){
  const params=new URLSearchParams(window.location.search);
  const name=params.get('name');
  const skin=parseInt(params.get('skin')||'0');
  const token=params.get('token')||'';
  const lobby=params.get('lobby')||'http://46.225.224.163:3000';
  window._lobbyBase = lobby;
  if(token) window._authToken=token;
  if(name){
    selSkin=skin;
    document.getElementById('nameInp').value=name;
    buildSkinPreviews('spCards');
    if(token) loadProfileHUD(token);
    setTimeout(()=>joinGame(),800);
  }
});

async function loadProfileHUD(token) {
  try {
    const lobbyBase = window._lobbyBase || 'http://46.225.224.163:3000';
    const r = await fetch(lobbyBase+'/api/auth/me', { headers:{ 'Authorization':'Bearer '+token } });
    if (!r.ok) return;
    const { user } = await r.json();
    if (!user) return;
    window._profile = user;
    document.getElementById('hudAvatar').textContent = user.username[0].toUpperCase();
    document.getElementById('hudLevel').textContent = user.level;
    document.getElementById('hudCoins').textContent = user.coins;
    document.getElementById('hudProfile').style.display = 'flex';
  } catch(e) { /* guest */ }
}

let _gameStartTime = Date.now();
function resetGameTimer() { _gameStartTime = Date.now(); }
