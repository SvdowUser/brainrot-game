<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>tralala.io</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="hudRoot">
    <div id="coinPanel" class="glass">
      <img id="coinIcon" src="./assets/ui/coin.png" alt="coin" />
      <span id="coinFallback">🪙</span>
      <span id="coinValue">0</span>
    </div>

    <div id="statsPanel" class="glass">
      <div><strong>Player:</strong> <span id="playerName">Guest</span></div>
      <div><strong>Kills:</strong> <span id="killsValue">0</span></div>
      <div><strong>Deaths:</strong> <span id="deathsValue">0</span></div>
      <div><strong>Lives:</strong> <span id="livesValue">3</span></div>
      <div><strong>Area:</strong> <span id="areaValue">0%</span></div>
      <div><strong>Lobby:</strong> <span id="lobbyValue">0/30</span></div>
    </div>

    <div id="leaderboard" class="glass">
      <div class="panelTitle">Leaderboard</div>
      <ol id="leaderboardList"></ol>
    </div>

    <div id="miniMapWrap" class="glass">
      <div class="panelTitle">Mini Map</div>
      <canvas id="miniMap" width="220" height="220"></canvas>
    </div>

    <div id="joystick" aria-label="joystick">
      <div id="joyBase"><div id="joyStick"></div></div>
    </div>

    <div id="startOverlay">
      <div class="startCard glass">
        <div class="logoTitle">tralala.io</div>
        <div class="coinRow">
          <img class="coinSmall" src="./assets/ui/coin.png" alt="coin" />
          <span id="menuCoins">0</span>
        </div>

        <div class="heroPreview">
          <div id="heroCube"></div>
        </div>

        <label for="nameInput">Nickname</label>
        <input id="nameInput" type="text" maxlength="16" placeholder="Your name" autocomplete="off" />

        <div id="bestBarWrap">
          <div class="metaLabel">Best map control</div>
          <div id="bestBar"><span id="bestFill"></span></div>
          <div id="bestAreaText">0%</div>
        </div>

        <div class="menuButtons">
          <button id="skinsBtn" type="button" class="subBtn">Skins</button>
          <button id="startBtn" type="button" class="playBtn">Play</button>
        </div>
      </div>

      <div id="skinOverlay" class="hidden">
        <div class="skinCard glass">
          <h2>Skin unlocks</h2>
          <p>Unlock by area control or score milestones.</p>
          <div id="skinRow"></div>
          <button id="skinCloseBtn" type="button" class="subBtn">Back</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
