<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>tralala.io</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="hudRoot">
    <div id="coinPanel" class="glass">
      <img id="coinIcon" src="./assets/ui/coin.png" alt="coin" />
      <span id="coinFallback">🪙</span>
      <span id="coinValue">0</span>
    </div>

    <div id="statsPanel" class="glass">
      <div><strong>Spieler:</strong> <span id="playerName">Guest</span></div>
      <div><strong>Kills:</strong> <span id="killsValue">0</span></div>
      <div><strong>Leben:</strong> <span id="livesValue">3</span></div>
      <div><strong>Fläche:</strong> <span id="areaValue">0%</span></div>
      <div><strong>Lobby:</strong> <span id="lobbyValue">0/30</span></div>
    </div>

    <div id="miniMapWrap" class="glass">
      <div class="panelTitle">Mini Map</div>
      <canvas id="miniMap" width="280" height="280"></canvas>
    </div>

    <div id="leaderboard" class="glass">
      <div class="panelTitle">Bestenliste</div>
      <ol id="leaderboardList"></ol>
    </div>

    <div id="tips" class="glass">WASD / Pfeiltasten · Trail schließen = Fläche sichern</div>

    <div id="startOverlay">
      <div class="startCard glass">
        <h1>tralala.io</h1>
        <p>3D Territory Arena · 30 Spieler Lobby</p>

        <div class="heroPreview">
          <div id="heroCube"></div>
        </div>

        <label for="nameInput">Name</label>
        <input id="nameInput" type="text" maxlength="16" placeholder="Dein Name" autocomplete="off" />

        <label>Farb-Skin</label>
        <div id="skinRow"></div>

        <button id="startBtn" type="button">Join Lobby</button>
        <small>Icons/PNGs austauschbar in <code>client/assets/ui/</code> · Server URL in <code>client/src/main.js</code></small>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
