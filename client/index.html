<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>tralala.io</title>
  <link rel="stylesheet" href="./style.css?v=20260308x" />
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="uiRoot">
    <section id="menuScreen" class="screen">
      <header class="topBar">
        <div class="pill coinPill"><span id="menuCoins">0</span></div>
        <button id="settingsBtn" class="iconBtn" type="button" aria-label="Settings">⚙</button>
      </header>

      <main class="menuMain">
        <h1 class="logo">tralala<span>.io</span></h1>
        <div class="heroWrap"><div id="heroCube" class="cube"></div></div>

        <div class="nameRow">
          <input id="nameInput" maxlength="16" placeholder="Guest" autocomplete="off" />
          <div class="pill small">Best <span id="bestScore">0</span></div>
        </div>

        <button id="playBtn" class="playBtn" type="button">PLAY</button>
        <button id="openSkinsBtn" class="subBtn" type="button">Skins</button>
      </main>
    </section>

    <section id="skinsScreen" class="screen hidden">
      <header class="skinsHead">
        <button id="skinsBackBtn" class="subBtn" type="button">Back</button>
        <h2>Skins</h2>
      </header>
      <div class="skinsBody">
        <button id="skinPrevBtn" class="navBtn" type="button">‹</button>
        <div class="skinCard">
          <div id="skinPreviewCube" class="cube large"></div>
          <h3 id="skinName">Sun</h3>
          <p id="skinRequirement">Unlocked</p>
        </div>
        <button id="skinNextBtn" class="navBtn" type="button">›</button>
      </div>
      <footer class="skinsFoot">
        <button id="skinSelectBtn" class="playBtn small" type="button">Select</button>
      </footer>
    </section>

    <section id="settingsSheet" class="overlay hidden">
      <div class="dialog">
        <h3>Settings</h3>
        <p>Minimal prototype menu restored.</p>
        <button id="settingsCloseBtn" class="subBtn" type="button">Close</button>
      </div>
    </section>
  </div>

  <script type="module" src="./src/main.js?v=20260308x"></script>
</body>
</html>
