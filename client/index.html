<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>tralala.io</title>
  <link rel="stylesheet" href="./style.css?v=20260308h" />
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="uiRoot">
    <section id="menuScreen" class="screen">
      <header class="topBar">
        <div class="pill"><span class="coin"></span><span id="menuCoins">0</span></div>
        <button id="settingsBtn" class="iconBtn" type="button" aria-label="Settings">⚙</button>
      </header>

      <main class="menuMain">
        <h1 class="logo">tralala<span>.io</span></h1>
        <div class="heroWrap"><div id="heroCube" class="cube"></div></div>

        <div class="nameRow">
          <input id="nameInput" maxlength="16" placeholder="Nickname" autocomplete="off" />
          <div class="pill small">Best <span id="bestScore">0</span></div>
        </div>

        <button id="playBtn" class="playBtn" type="button">PLAY</button>
        <button id="openSkinsBtn" class="subBtn" type="button">Skins</button>
      </main>
    </section>

    <section id="skinsScreen" class="screen hidden">
      <header class="skinsHead">
        <button id="skinsBackBtn" class="subBtn" type="button">Back</button>
        <h2>Skins</h2>
      </header>

      <div class="skinsBody">
        <button id="skinPrevBtn" class="navBtn" type="button">‹</button>
        <div class="skinCard">
          <div id="skinPreviewCube" class="cube large"></div>
          <h3 id="skinName">SUN</h3>
          <p id="skinRequirement">Unlocked</p>
        </div>
        <button id="skinNextBtn" class="navBtn" type="button">›</button>
      </div>

      <footer class="skinsFoot">
        <button id="skinSelectBtn" class="playBtn small" type="button">Select</button>
      </footer>
    </section>

    <section id="settingsSheet" class="overlay hidden">
      <div class="dialog">
        <h3>Settings</h3>
        <p id="networkHint">For online play, your Node server must run and be reachable.</p>
        <button id="settingsCloseBtn" class="subBtn" type="button">Close</button>
      </div>
    </section>

    <section id="tutorialCard" class="tutorial hidden">
      <button id="closeTutorialBtn" class="closeBtn" type="button">✕</button>
      <p>Close your trail loop to capture territory.</p>
    </section>

    <section id="gameHud" class="hidden">
      <div class="hudTop">
        <div class="pill"><span class="coin"></span><span id="coinValue">0</span></div>
        <div class="pill">Score <span id="scoreValue">0</span></div>
        <div class="pill">Area <span id="areaValue">0%</span></div>
      </div>

      <aside class="hudRight">
        <div class="leaderboard">
          <h3>Leaderboard</h3>
          <ol id="leaderboardList"></ol>
        </div>
        <div class="playerInfo">
          <span id="playerName">Guest</span>
          <span id="livesValue">❤❤❤</span>
        </div>
      </aside>

      <canvas id="miniMap" width="128" height="128"></canvas>

      <div id="mobileJoystick" class="hidden" aria-hidden="true">
        <div id="joyBase"><div id="joyKnob"></div></div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const BUILD = '20260308h';
      const params = new URLSearchParams(location.search);
      if (params.get('v') !== BUILD) {
        params.set('v', BUILD);
        location.replace(`${location.pathname}?${params.toString()}${location.hash}`);
      }
    })();
  </script>
  <script type="module" src="./src/main.js?v=20260308h"></script>
</body>
</html>
