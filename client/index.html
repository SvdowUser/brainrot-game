<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>tralala.io</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="uiRoot">

    <!-- MENU SCREEN -->
    <section id="menuScreen" class="screen">
      <header class="topBar">
        <div class="pill coinPill">🪙 <span id="menuCoins">0</span></div>
        <button id="settingsBtn" class="iconBtn" type="button" aria-label="Settings">⚙</button>
      </header>
      <main class="menuMain">
        <h1 class="logo">tralala<span>.io</span></h1>
        <div class="heroWrap"><div id="heroCube" class="cube"></div></div>
        <div class="nameRow">
          <input id="nameInput" maxlength="16" placeholder="Guest" autocomplete="off" />
          <div class="pill small">Best <span id="bestScore">0</span></div>
        </div>
        <div class="playerInfo">
          <span id="playerName">Guest</span>
          <span id="livesValue">❤❤❤</span>
        </div>
        <button id="playBtn" class="playBtn" type="button">PLAY</button>
        <button id="openSkinsBtn" class="subBtn" type="button">Skins</button>
      </main>
    </section>

    <!-- SKINS SCREEN -->
    <section id="skinsScreen" class="screen hidden">
      <header class="skinsHead">
        <button id="skinsBackBtn" class="subBtn" type="button">← Back</button>
        <h2>Skins</h2>
      </header>
      <div class="skinsBody">
        <button id="skinPrevBtn" class="navBtn" type="button">‹</button>
        <div class="skinCard">
          <div id="skinPreviewCube" class="cube large"></div>
          <h3 id="skinName">Sun</h3>
          <p id="skinRequirement">Unlocked</p>
        </div>
        <button id="skinNextBtn" class="navBtn" type="button">›</button>
      </div>
      <footer class="skinsFoot">
        <button id="skinSelectBtn" class="playBtn small" type="button">Select</button>
      </footer>
    </section>

    <!-- SETTINGS OVERLAY -->
    <section id="settingsSheet" class="overlay hidden">
      <div class="dialog">
        <h3>Settings</h3>
        <p>tralala.io — multiplayer territory game</p>
        <p id="serverBadge">Connecting...</p>
        <button id="settingsCloseBtn" class="subBtn" type="button">Close</button>
      </div>
    </section>

    <!-- GAME HUD -->
    <section id="gameHud" class="screen hidden">
      <header class="hudTop">
        <div class="pill hudPill">🪙 <span id="coinValue">0</span></div>
        <div class="pill hudPill">Score <span id="scoreValue">0</span></div>
        <div class="pill hudPill">Area <span id="areaValue">0%</span></div>
        <div class="pill hudPill" id="leaderboardToggle">Leaderboard</div>
      </header>

      <!-- Leaderboard panel -->
      <div id="leaderboardPanel" class="leaderboardPanel hidden">
        <div class="lbTitle">🏆 Top Players</div>
        <ul id="leaderboardList"></ul>
      </div>

      <!-- Tutorial card -->
      <div id="tutorialCard" class="tutorialCard hidden">
        <div class="tutIcon">🌀</div>
        <p><strong>Close a loop to capture territory.</strong></p>
        <button id="closeTutorialBtn" class="tutClose" type="button">✕</button>
      </div>
    </section>

  </div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
