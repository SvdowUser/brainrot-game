<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tralala.io</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="hud">
    <div id="coinsBadge">
      <div class="coin-spin">🪙</div>
      <span id="coinsValue">0</span>
    </div>

    <div id="statsPanel">
      <div><strong>Spieler:</strong> <span id="playerNameLabel">Guest</span></div>
      <div><strong>Kills:</strong> <span id="killsValue">0</span></div>
      <div><strong>Fläche:</strong> <span id="areaValue">0%</span></div>
    </div>

    <div id="leaderboard">
      <div class="board-title">Bestenliste</div>
      <ol id="leaderboardList"></ol>
    </div>

    <div id="tips">WASD / Pfeiltasten bewegen dich · Schließe deinen Trail, um Fläche zu erobern.</div>
  </div>

  <div id="startOverlay">
    <div class="start-card">
      <h1>tralala.io</h1>
      <p>3D Territory Arena · professioneller Prototype</p>

      <div class="hero-preview">
        <div id="heroCube"></div>
      </div>

      <label>Name</label>
      <input id="nameInput" type="text" maxlength="16" placeholder="Dein Name" />

      <label>Skin</label>
      <div id="skinRow"></div>

      <button id="startBtn">Spiel starten</button>
      <small>Model-Uploads später: siehe <code>client/src/modelPipeline.md</code>.</small>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
