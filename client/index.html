<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Los Tralaleritos Hub</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="hudRoot">
    <div id="topBar">
      <div class="portrait-card">
        <div id="portraitFrame">
          <canvas id="portraitCanvas" width="96" height="96"></canvas>
        </div>
        <div class="portrait-meta">
          <div class="small-label">LOS TRALALERITOS HUB</div>
          <div id="portraitName">Guest</div>
          <div class="small-sub">Beach-01</div>
        </div>
      </div>

      <div class="top-actions">
        <div id="serverBadge">Beach-01 · 0/20</div>
        <button id="settingsBtn" class="icon-btn" type="button">⚙</button>
      </div>
    </div>

    <div id="settingsPanel" class="panel hidden">
      <div class="panel-title">Controls</div>
      <div class="panel-text">WASD / Arrow Keys: move</div>
      <div class="panel-text">Space: jump</div>
      <div class="panel-text">Enter: focus chat</div>
      <div class="panel-text">Mouse drag / touch drag: camera</div>
      <div class="panel-text">Mobile: joystick + jump button</div>
    </div>

    <div id="chatPanel" class="glass-panel">
      <div id="chatLog"></div>
      <div class="chat-row">
        <input id="chatInput" type="text" maxlength="120" placeholder="Type a message..." autocomplete="off" />
        <button id="chatSend" type="button">Send</button>
      </div>
    </div>

    <div id="mobileControls">
      <div id="joystickBase"><div id="joystickKnob"></div></div>
      <button id="jumpBtn" type="button">Jump</button>
    </div>

    <div id="overlayLabels"></div>

    <div id="startOverlay">
      <div class="start-card">
        <div class="start-title">Enter the hub</div>
        <div class="start-subtitle">Choose a guest name and starter skin.</div>
        <input id="nameInput" type="text" maxlength="16" placeholder="Choose a name" autocomplete="off" />

        <div class="skin-selector">
          <button id="skinPrev" class="skin-arrow" type="button">‹</button>
          <div id="skinCardWrap"></div>
          <button id="skinNext" class="skin-arrow" type="button">›</button>
        </div>

        <div id="skinStatus">Starter skin 1 / 3</div>
        <button id="enterBtn" class="enter-btn" type="button">Enter hub</button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
