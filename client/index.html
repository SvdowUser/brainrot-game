<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>tralala.io</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="uiRoot">
    <section id="menuScreen" class="screen active">
      <div class="menuTopBar">
        <button id="menuCoin" class="chip chipCoin" type="button" aria-label="Coins">
          <span class="hexIcon"></span>
          <span id="menuCoinValue">0</span>
        </button>
        <button id="settingsBtn" class="chip chipIcon" type="button" aria-label="Settings">⚙</button>
      </div>

      <div class="menuCenter">
        <h1 class="logo">tralala<span>.io</span></h1>
        <div class="heroStage">
          <div id="heroCube"></div>
        </div>

        <div class="profileRow">
          <input id="nameInput" type="text" maxlength="16" placeholder="Nickname" autocomplete="off" />
          <div class="bestScore">Best <span id="bestScoreValue">0</span></div>
        </div>

        <button id="playBtn" class="ctaPlay" type="button">▶</button>
        <button id="openSkinsBtn" class="ctaSub" type="button">Skins</button>
      </div>
    </section>

    <section id="skinsScreen" class="screen hidden">
      <div class="skinsHeader">
        <button id="skinsBackBtn" class="smallBtn" type="button">Back</button>
        <h2>Choose Skin</h2>
      </div>

      <div class="skinCarousel">
        <button id="skinPrevBtn" class="navBtn" type="button">‹</button>
        <div class="skinPreviewCard">
          <div id="skinPreviewCube"></div>
          <h3 id="skinName">SUN</h3>
          <p id="skinStatus">Unlocked</p>
        </div>
        <button id="skinNextBtn" class="navBtn" type="button">›</button>
      </div>

      <div class="skinsActions">
        <button id="skinSelectBtn" class="smallBtn primary" type="button">Select</button>
      </div>
    </section>

    <section id="tutorialCard" class="tutorial hidden" role="dialog" aria-live="polite">
      <button id="closeTutorialBtn" class="tutorialClose" type="button">✕</button>
      <div class="tutorialIcon">🌀</div>
      <p>Close a loop to expand your area.</p>
    </section>

    <section id="gameHud" class="hidden">
      <div class="hudTopRow">
        <div class="chip chipCoin"><span class="hexIcon"></span><span id="coinValue">0</span></div>
        <div class="chip">Score <span id="scoreValue">0</span></div>
        <div class="chip">Area <span id="areaValue">0%</span></div>
      </div>

      <div class="hudSide">
        <div class="leaderboardCard">
          <h3>Leaderboard</h3>
          <ol id="leaderboardList"></ol>
        </div>
        <div class="playerCard">
          <span id="playerName">Guest</span>
          <span id="livesValue">❤❤❤</span>
        </div>
      </div>

      <canvas id="miniMap" width="124" height="124"></canvas>

      <div id="mobileJoystick" aria-hidden="true">
        <div id="joyBase"><div id="joyKnob"></div></div>
      </div>
    </section>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
